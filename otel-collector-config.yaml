# ============================================================
# OpenTelemetry Collector Configuration
# ============================================================
# All dynamic values are injected via environment variables
# from the .env file through docker-compose.
#
# Pipeline Architecture:
#   All apps → Collector → traces/jaeger  (batch)         → Jaeger :16686
#                        → traces/custom  (tail_sampling) → ${CUSTOM_CONSUMER_ENDPOINT}
# ============================================================

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"
          allowed_headers:
            - "Content-Type"
            - "traceparent"
            - "tracestate"
            - "baggage"

processors:
  batch/jaeger:
    timeout: 5s
    send_batch_size: 512

  tail_sampling/custom:
    decision_wait: 10s
    num_traces: 10000
    policies:
      - name: always-sample
        type: always_sample

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Endpoint is injected from .env → docker-compose → container env var.
  # The OTel Collector natively expands ${VAR} in config files.
  otlp/custom:
    endpoint: ${CUSTOM_CONSUMER_ENDPOINT}
    tls:
      insecure: true

  debug:
    verbosity: basic

service:
  extensions: [health_check]
  pipelines:
    traces/jaeger:
      receivers:  [otlp]
      processors: [batch/jaeger]
      exporters:  [otlp/jaeger, debug]

    traces/custom:
      receivers:  [otlp]
      processors: [tail_sampling/custom]
      exporters:  [otlp/custom]

  telemetry:
    logs:
      level: info
