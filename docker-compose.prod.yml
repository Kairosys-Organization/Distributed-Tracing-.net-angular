# Production Docker Compose
# ── All values come from .env — clients only edit that file ─────

services:
  # ─── Observability ─────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: pathfinder-jaeger
    ports:
      - "16686:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - pathfinder-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:16686"]
      interval: 30s
      timeout: 5s
      retries: 3

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: pathfinder-otel-collector
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4319:4317"
      - "4320:4318"
    environment:
      - CUSTOM_CONSUMER_ENDPOINT=${CUSTOM_CONSUMER_ENDPOINT}
    depends_on:
      jaeger:
        condition: service_healthy
    networks:
      - pathfinder-network
    restart: unless-stopped

  # ─── Backend API ───────────────────────────────────────────────
  api:
    build:
      context: ./PathfinderApi
      dockerfile: Dockerfile
    container_name: pathfinder-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - OTEL_SERVICE_NAME=${DOTNET_SERVICE_NAME}
      - OpenTelemetry__ServiceName=${DOTNET_SERVICE_NAME}
      - OpenTelemetry__OtlpEndpoint=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - pathfinder-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Angular UI ────────────────────────────────────────────────
  ui:
    build:
      context: ./pathfinder-ui
      dockerfile: Dockerfile
    container_name: pathfinder-ui
    ports:
      - "80:80"
    environment:
      - API_URL=${API_URL}
      - OTEL_URL=${OTEL_COLLECTOR_HTTP_URL}
    depends_on:
      api:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - pathfinder-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  pathfinder-network:
    driver: bridge
