services:
  # ─── Observability ─────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: pathfinder-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
    networks:
      - pathfinder-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:16686"]
      interval: 15s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: pathfinder-otel-collector
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4319:4317"     # OTLP gRPC  — for external apps
      - "4320:4318"     # OTLP HTTP  — for browser / external apps
    environment:
      # Passed into otel-collector-config.yaml via native env-var expansion
      - CUSTOM_CONSUMER_ENDPOINT=${CUSTOM_CONSUMER_ENDPOINT}
    depends_on:
      jaeger:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pathfinder-network
    # otel-collector-contrib is distroless — no shell available for healthcheck.
    # The collector starts in < 1s so service_started is sufficient.

  # ─── Backend API ───────────────────────────────────────────────
  pathfinder-api:
    build:
      context: ./PathfinderApi
      dockerfile: Dockerfile
    container_name: pathfinder-api
    ports:
      - "5215:8080"
    environment:
      - OTEL_SERVICE_NAME=${DOTNET_SERVICE_NAME}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_DOTNET_AUTO_TRACES_ADDITIONAL_SOURCES=PathfinderApi
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - pathfinder-network

  # ─── Angular UIs ───────────────────────────────────────────────
  pathfinder-ui:
    build:
      context: ./pathfinder-ui
      dockerfile: Dockerfile
    container_name: pathfinder-ui
    ports:
      - "4200:80"
    environment:
      - API_URL=${API_URL}
      - OTEL_URL=${OTEL_COLLECTOR_HTTP_URL}
    depends_on:
      - pathfinder-api
    networks:
      - pathfinder-network

  pathfinder-ui-zoneless:
    build:
      context: ./pathfinder-ui-zoneless
      dockerfile: Dockerfile
    container_name: pathfinder-ui-zoneless
    ports:
      - "4201:80"
    environment:
      - API_URL=${API_URL}
      - OTEL_URL=${OTEL_COLLECTOR_HTTP_URL}
    depends_on:
      - pathfinder-api
    networks:
      - pathfinder-network

networks:
  pathfinder-network:
    driver: bridge
